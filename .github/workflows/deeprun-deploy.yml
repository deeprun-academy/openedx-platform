name: Deeprun Deploy

on:
  push:
    branches:
      - dev
      - uat
      - prod

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - uat
          - prod
      build_mode:
        description: 'Build mode'
        required: true
        default: 'fast'
        type: choice
        options:
          - fast
          - full

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/deeprun-academy/openedx
  BASE_IMAGE_NAME: ghcr.io/deeprun-academy/openedx-base

jobs:
  # ─────────────────────────────────────────
  # Determine build strategy
  # ─────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      branch: ${{ steps.tag.outputs.branch }}
      build_mode: ${{ steps.mode.outputs.mode }}

    steps:
      - name: Determine tag and branch
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ github.event.inputs.environment }}" in
              dev)  echo "tag=dev"  >> $GITHUB_OUTPUT; echo "branch=dev"  >> $GITHUB_OUTPUT ;;
              uat)  echo "tag=uat"  >> $GITHUB_OUTPUT; echo "branch=uat"  >> $GITHUB_OUTPUT ;;
              prod) echo "tag=prod" >> $GITHUB_OUTPUT; echo "branch=prod" >> $GITHUB_OUTPUT ;;
            esac
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "branch=dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/uat" ]]; then
            echo "tag=uat" >> $GITHUB_OUTPUT
            echo "branch=uat" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/prod" ]]; then
            echo "tag=prod" >> $GITHUB_OUTPUT
            echo "branch=prod" >> $GITHUB_OUTPUT
          fi

      - name: Determine build mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ github.event.inputs.build_mode }}" >> $GITHUB_OUTPUT
          else
            # On push: use fast build if base image exists, full otherwise
            TAG="${{ steps.tag.outputs.tag }}"
            if docker manifest inspect ${{ env.BASE_IMAGE_NAME }}:${TAG} > /dev/null 2>&1; then
              echo "mode=fast" >> $GITHUB_OUTPUT
            else
              echo "mode=full" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

  # ─────────────────────────────────────────
  # FULL BUILD — Tutor-generated Dockerfile (~20 min)
  # Builds base image + final image
  # Run manually or when base image doesn't exist
  # ─────────────────────────────────────────
  build-full:
    name: Full Build
    needs: prepare
    if: needs.prepare.outputs.build_mode == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout tutor-config
        uses: actions/checkout@v4
        with:
          repository: deeprun-academy/tutor-config
          ref: main
          path: tutor-config

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tutor
        run: pip install tutor==20.0.5

      - name: Install deeprun plugin
        run: |
          PLUGIN_ROOT=$(tutor plugins printroot)
          mkdir -p "$PLUGIN_ROOT"
          cp tutor-config/plugins/deeprun.py "$PLUGIN_ROOT/deeprun.py"
          tutor plugins enable deeprun

      - name: Configure Tutor
        run: |
          tutor config save \
            --set EDX_PLATFORM_VERSION=${{ needs.prepare.outputs.branch }} \
            --set DOCKER_IMAGE_OPENEDX=${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        timeout-minutes: 40
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          cd $(tutor config printroot)/env/build/openedx
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag ${{ env.IMAGE_NAME }}:${TAG} \
            --tag ${{ env.IMAGE_NAME }}:${TAG}-${{ github.sha }} \
            --tag ${{ env.BASE_IMAGE_NAME }}:${TAG} \
            --push \
            .

  # ─────────────────────────────────────────
  # FAST BUILD — Code-only changes (~5 min)
  # Extends the base image, copies source + rebuilds assets
  # ─────────────────────────────────────────
  build-fast:
    name: Fast Build
    needs: prepare
    if: needs.prepare.outputs.build_mode == 'fast'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push fast image
        timeout-minutes: 10
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          docker buildx build \
            -f .github/Dockerfile.fast \
            --build-arg BASE_IMAGE=${{ env.BASE_IMAGE_NAME }}:${TAG} \
            --tag ${{ env.IMAGE_NAME }}:${TAG} \
            --tag ${{ env.IMAGE_NAME }}:${TAG}-${{ github.sha }} \
            --push \
            .

  # ─────────────────────────────────────────
  # Deploy to Dev
  # ─────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    needs: [prepare, build-full, build-fast]
    # Run if either build succeeded (the other is skipped)
    if: |
      always() &&
      needs.prepare.outputs.tag == 'dev' &&
      (needs.build-full.result == 'success' || needs.build-fast.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: dev

    steps:
      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            source ~/.tutor-venv/bin/activate

            echo "=== Cleaning up unused images ==="
            docker image prune -af --filter "until=1h" || true

            echo "=== Updating Tutor plugin ==="
            PLUGIN_ROOT=$(tutor plugins printroot)
            curl -sL "https://raw.githubusercontent.com/deeprun-academy/tutor-config/main/plugins/deeprun.py" -o "$PLUGIN_ROOT/deeprun.py"

            echo "=== Pulling image ==="
            docker pull ghcr.io/deeprun-academy/openedx:dev

            echo "=== Configuring Tutor to use GHCR image ==="
            tutor config save \
              --set DOCKER_IMAGE_OPENEDX=ghcr.io/deeprun-academy/openedx:dev

            echo "=== Restarting ==="
            docker compose -f ~/.local/share/tutor/env/local/docker-compose.yml -f ~/.local/share/tutor/env/local/docker-compose.prod.yml --project-name tutor_local up --remove-orphans -d

            echo "=== Running migrations ==="
            tutor local run lms ./manage.py lms migrate --noinput
            tutor local run cms ./manage.py cms migrate --noinput

            echo "=== Dev deploy complete ==="

  # ─────────────────────────────────────────
  # Deploy to UAT
  # ─────────────────────────────────────────
  deploy-uat:
    name: Deploy to UAT
    needs: [prepare, build-full, build-fast]
    if: |
      always() &&
      needs.prepare.outputs.tag == 'uat' &&
      (needs.build-full.result == 'success' || needs.build-fast.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: uat

    steps:
      - name: Deploy to UAT server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            source ~/.tutor-venv/bin/activate

            echo "=== Cleaning up unused images ==="
            docker image prune -af --filter "until=1h" || true

            echo "=== Updating Tutor plugin ==="
            PLUGIN_ROOT=$(tutor plugins printroot)
            curl -sL "https://raw.githubusercontent.com/deeprun-academy/tutor-config/main/plugins/deeprun.py" -o "$PLUGIN_ROOT/deeprun.py"

            echo "=== Pulling image ==="
            docker pull ghcr.io/deeprun-academy/openedx:uat

            echo "=== Configuring Tutor to use GHCR image ==="
            tutor config save \
              --set DOCKER_IMAGE_OPENEDX=ghcr.io/deeprun-academy/openedx:uat

            echo "=== Restarting ==="
            docker compose -f ~/.local/share/tutor/env/local/docker-compose.yml -f ~/.local/share/tutor/env/local/docker-compose.prod.yml --project-name tutor_local up --remove-orphans -d

            echo "=== Running migrations ==="
            tutor local run lms ./manage.py lms migrate --noinput
            tutor local run cms ./manage.py cms migrate --noinput

            echo "=== UAT deploy complete ==="

  # ─────────────────────────────────────────
  # Deploy to Prod
  # ─────────────────────────────────────────
  deploy-prod:
    name: Deploy to Prod
    needs: [prepare, build-full, build-fast]
    if: |
      always() &&
      needs.prepare.outputs.tag == 'prod' &&
      (needs.build-full.result == 'success' || needs.build-fast.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: prod

    steps:
      - name: Deploy to Prod server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            source ~/.tutor-venv/bin/activate

            echo "=== Cleaning up unused images ==="
            docker image prune -af --filter "until=1h" || true

            echo "=== Updating Tutor plugin ==="
            PLUGIN_ROOT=$(tutor plugins printroot)
            curl -sL "https://raw.githubusercontent.com/deeprun-academy/tutor-config/main/plugins/deeprun.py" -o "$PLUGIN_ROOT/deeprun.py"

            echo "=== Pulling image ==="
            docker pull ghcr.io/deeprun-academy/openedx:prod

            echo "=== Configuring Tutor to use GHCR image ==="
            tutor config save \
              --set DOCKER_IMAGE_OPENEDX=ghcr.io/deeprun-academy/openedx:prod

            echo "=== Restarting ==="
            docker compose -f ~/.local/share/tutor/env/local/docker-compose.yml -f ~/.local/share/tutor/env/local/docker-compose.prod.yml --project-name tutor_local up --remove-orphans -d

            echo "=== Running migrations ==="
            tutor local run lms ./manage.py lms migrate --noinput
            tutor local run cms ./manage.py cms migrate --noinput

            echo "=== Prod deploy complete ==="
